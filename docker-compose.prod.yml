version: "3.8"

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: always

    ports:
      # Raw protocol ports exposed directly
      - "8554:8554"       # RTSP TCP
      - "1935:1935"       # RTMP TCP
      - "8890:8890/udp"   # SRT UDP
      - "8189:8189/udp"   # WebRTC ICE UDP

      # Optional direct HTTP access.
      # Remove these if you ONLY want access through Coolify proxy.
      - "8889:8889"       # WebRTC HTTP
      # - "8888:8888"     # HLS HTTP direct
      # - "9997:9997"     # API HTTP direct

    expose:
      - "8888" # HLS via Coolify proxy
      - "8889" # WebRTC HTTP via Coolify proxy, optional
      - "9997" # API via Coolify proxy
      - "9998" # Metrics, optional

    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - recordings:/recordings

    environment:
      - MTX_PROTOCOLS=tcp
      - MTX_WEBRTCADDITIONALHOSTS=media.qruxel.productions,mtx-hls.qruxel.productions

    networks:
      - mediamtx-network


  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_NODE_ENV: production
        NEXT_PUBLIC_MEDIAMTX_API_URL: https://mtx-api.qruxel.productions/v3/config
        NEXT_PUBLIC_MEDIAMTX_HLS_URL: https://mtx-hls.qruxel.productions/hls

    restart: always

    expose:
      - "3000"

    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_MEDIAMTX_API_URL=https://mtx-api.qruxel.productions/v3/config
      - NEXT_PUBLIC_MEDIAMTX_HLS_URL=https://mtx-hls.qruxel.productions/hls

    depends_on:
      - mediamtx

    networks:
      - mediamtx-network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


networks:
  mediamtx-network:
    driver: bridge

volumes:
  recordings:
    driver: local